const grid = document.getElementById('grid');

function getType(id) {
  if (id.endsWith('_A')) return 'A';
  if (id.endsWith('_C')) return 'C';
  return 'B';
}

data.forEach(item => {
  const attrs = item.inferred_attributes || {};
  const attrHtml = Object.entries(attrs)
    .filter(([k]) => k !== 'reasoning' && k !== 'error')
    .map(([k, v]) => `<span class="attr"><b>${k}</b>: ${Array.isArray(v) ? v.join(', ') : v}</span>`)
    .join('');

  const img = item.image_path ? `<img src="${item.image_path}" alt="${item.id}">` : '';
  const type = getType(item.id);
  const reasoning = attrs.reasoning ? `<div class="reasoning"><b>Reasoning:</b> ${attrs.reasoning}</div>` : '';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="type-badge type-${type}">Type ${type}</span>
    <span style="font-size:0.75rem;color:#999;">${item.id}</span>
    ${img}
    <div class="query">${item.query}</div>
    <div class="attrs">${attrHtml}</div>
    ${reasoning}
  `;
  grid.appendChild(card);
});
